<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decryption | Cryptography Combo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page">

  <!-- Header with logo and site name -->
  <header class="site-header">
    <img src="assets/logo.jpeg" alt="Logo" class="logo">
  </header>

  <!-- Decryption Overlay -->
  <div class="overlay">
    <h1 class="title">Decryption</h1>

    <!-- Technique Selection -->
    <div class="form-group">
      <label for="technique">Choose Technique:</label>
      <select id="technique">
        <option value="caesar">Caesar Cipher</option>
        <option value="vigenere">Vigenère Cipher</option>
        <option value="aes">AES</option>
      </select>
    </div>

    <!-- Key Input (required) -->
    <div class="form-group">
      <label for="dec-key">Key (required):</label>
      <input type="text" id="dec-key" placeholder="Enter the key">
    </div>

    <!-- Text Input (ciphertext) -->
    <div class="form-group">
      <label for="input-text">Enter Text to Decrypt:</label>
      <textarea id="input-text" rows="5" placeholder="Type your encrypted text here..."></textarea>
    </div>

    <!-- Action -->
    <button id="decrypt-btn" class="action-btn">Decrypt</button>

    <!-- Navigation -->
    <div class="nav-links">
      <a href="index.html">← Back</a>
    </div>
  </div>

  <script src="js/decrypt.js"></script>
</body>
</html>
