<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encryption | Cryptography Combo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page">

  <!-- Header with logo and site name -->
  <header class="site-header">
    <img src="assets/logo.jpeg" alt="Logo" class="logo">
  </header>

  <!-- Encryption Overlay -->
  <div class="overlay">
    <h1 class="title">Encryption</h1>

    <!-- Technique Selection -->
    <div class="form-group">
      <label for="technique">Choose Technique:</label>
      <select id="technique">
        <option value="caesar">Caesar Cipher</option>
        <option value="vigenere">Vigenère Cipher</option>
        <option value="aes">AES</option>
      </select>
    </div>

    <!-- Key Input -->
    <div class="form-group">
      <label for="enc-key">Key (optional):</label>
      <input type="text" id="enc-key" placeholder="Enter key or leave blank for default">
    </div>

    <!-- Text Input -->
    <div class="form-group">
      <label for="input-text">Enter Text to Encrypt:</label>
      <textarea id="input-text" rows="5" placeholder="Type your plain text here..."></textarea>
    </div>

    <!-- Action -->
    <button id="encrypt-btn" class="action-btn">Encrypt</button>

    <!-- Navigation -->
    <div class="nav-links">
      <a href="index.html">← Back</a>
    </div>
  </div>

  <script src="js/encrypt.js"></script>
</body>
</html>
